name: release-binaries

permissions:
  contents: write

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v0.23.0"
        required: true

jobs:
  test:
    name: release test gate
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$version" != "$cargo_version" ]; then
            echo "release tag ${RELEASE_TAG} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Test
        run: cargo test --locked -- --test-threads=1

      - name: Verify release target matrix
        run: scripts/release/verify-release-target-matrix.sh

  build:
    name: build ${{ matrix.target }}
    needs:
      - test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            binary: rpotato
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: rpotato
            archive: tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: rpotato
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: rpotato
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rpotato.exe
            archive: zip
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$version" != "$cargo_version" ]; then
            echo "release tag ${RELEASE_TAG} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ASSET_BASE=rpotato-${RELEASE_TAG}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test native Windows backend lifecycle
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: |
          cargo test --locked --target ${{ matrix.target }} --bin rpotato backend_stream::tests:: -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --bin rpotato generation_ -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --test backend_lifecycle -- --test-threads=1

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke packaged binary
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          scripts/release/verify-release-binary-smoke.sh "$binary" "$VERSION"

      - name: Smoke Windows uninstall plans
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          scripts/release/verify-uninstall-smoke.sh "$binary"

      - name: Package tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/staging/${ASSET_BASE}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          chmod +x "$package_dir/${{ matrix.binary }}"
          tar -czf "dist/${ASSET_BASE}.tar.gz" -C "dist/staging" "$ASSET_BASE"
          (cd dist && shasum -a 256 "${ASSET_BASE}.tar.gz" > "${ASSET_BASE}.tar.gz.sha256")

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageDir = "dist/staging/$env:ASSET_BASE"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$packageDir/"
          Copy-Item README.md "$packageDir/"
          Copy-Item LICENSE "$packageDir/"
          $archive = "dist/$env:ASSET_BASE.zip"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          $checksumLine = "$hash  $env:ASSET_BASE.zip`n"
          [System.IO.File]::WriteAllText("$archive.sha256", $checksumLine, [System.Text.Encoding]::ASCII)

      - name: Verify checksum paths
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/verify-checksum-basenames.sh "dist/${ASSET_BASE}.${{ matrix.archive }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASE }}
          path: |
            dist/${{ env.ASSET_BASE }}.${{ matrix.archive }}
            dist/${{ env.ASSET_BASE }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dist/${ASSET_BASE}.${{ matrix.archive }}" \
            "dist/${ASSET_BASE}.${{ matrix.archive }}.sha256" \
            --clobber

  checksums:
    name: publish aggregate checksums
    runs-on: ubuntu-latest
    needs:
      - build
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: rpotato-${{ env.RELEASE_TAG }}-*

      - name: Build aggregate checksum file
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist/artifacts -name '*.sha256' -type f -print0 \
            | sort -z \
            | xargs -0 cat \
            > "dist/rpotato-${RELEASE_TAG}-checksums.txt"
          test -s "dist/rpotato-${RELEASE_TAG}-checksums.txt"
          scripts/release/verify-checksum-basenames.sh "dist/rpotato-${RELEASE_TAG}-checksums.txt"

      - name: Upload checksum workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpotato-${{ env.RELEASE_TAG }}-checksums
          path: dist/rpotato-${{ env.RELEASE_TAG }}-checksums.txt
          if-no-files-found: error

      - name: Upload checksum file to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dist/rpotato-${RELEASE_TAG}-checksums.txt" \
            --clobber
