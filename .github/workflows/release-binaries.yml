name: release-binaries

permissions:
  contents: write

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build, for example v0.23.0"
        required: true

jobs:
  test:
    name: release test gate
    runs-on: ubuntu-24.04
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$version" != "$cargo_version" ]; then
            echo "release tag ${RELEASE_TAG} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify repository tool pins
        run: scripts/release/verify-toolchain-pins.sh

      - name: Test release asset verifier
        run: bash scripts/release/test-verify-release-assets.sh

      - name: Test release workflow contract
        run: bash scripts/release/test-release-workflow-contract.sh

      - name: Test
        run: cargo test --locked -- --test-threads=1

      - name: Verify durable runtime proof set
        run: scripts/release/verify-durable-runtime-proofs.sh

      - name: Verify release target matrix
        run: scripts/release/verify-release-target-matrix.sh

  build:
    name: build ${{ matrix.target }}
    needs:
      - test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: aarch64-apple-darwin
            binary: rpotato
            archive: tar.gz
          - os: macos-26-intel
            target: x86_64-apple-darwin
            binary: rpotato
            archive: tar.gz
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: rpotato
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: rpotato
            archive: tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            binary: rpotato.exe
            archive: zip
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$version" != "$cargo_version" ]; then
            echo "release tag ${RELEASE_TAG} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "ASSET_BASE=rpotato-${RELEASE_TAG}-${{ matrix.target }}" >> "$GITHUB_ENV"

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test native Windows backend lifecycle
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked --target ${{ matrix.target }} --bin rpotato adapters::filesystem::windows_replace::tests:: -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --bin rpotato adapters::system_install::tests:: -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --bin rpotato adapters::llama_cpp::stream::tests:: -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --bin rpotato app::inference_adapter::backend::tests:: -- --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --test inference backend_lifecycle::native_backend_cancel_and_stop_lifecycle -- --test-threads=1

      - name: Test native interactive terminal
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked --target ${{ matrix.target }} --test surfaces native_terminal::entry_quit -- --exact --test-threads=1
          cargo test --locked --target ${{ matrix.target }} --test surfaces native_terminal::full_adapter -- --exact --test-threads=1

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Smoke packaged binary
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          scripts/release/verify-release-binary-smoke.sh "$binary" "$VERSION"

      - name: Smoke Windows uninstall plans
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          scripts/release/verify-uninstall-smoke.sh "$binary"

      - name: Package tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package_dir="dist/staging/${ASSET_BASE}"
          mkdir -p "$package_dir"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$package_dir/"
          cp README.md LICENSE "$package_dir/"
          chmod +x "$package_dir/${{ matrix.binary }}"
          tar -czf "dist/${ASSET_BASE}.tar.gz" -C "dist/staging" "$ASSET_BASE"
          (cd dist && shasum -a 256 "${ASSET_BASE}.tar.gz" > "${ASSET_BASE}.tar.gz.sha256")

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageDir = "dist/staging/$env:ASSET_BASE"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$packageDir/"
          Copy-Item README.md "$packageDir/"
          Copy-Item LICENSE "$packageDir/"
          $archive = "dist/$env:ASSET_BASE.zip"
          Compress-Archive -Path "$packageDir/*" -DestinationPath $archive -Force
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          $checksumLine = "$hash  $env:ASSET_BASE.zip`n"
          [System.IO.File]::WriteAllText("$archive.sha256", $checksumLine, [System.Text.Encoding]::ASCII)

      - name: Verify checksum paths
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/verify-checksum-basenames.sh "dist/${ASSET_BASE}.${{ matrix.archive }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.ASSET_BASE }}
          path: |
            dist/${{ env.ASSET_BASE }}.${{ matrix.archive }}
            dist/${{ env.ASSET_BASE }}.${{ matrix.archive }}.sha256
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dist/${ASSET_BASE}.${{ matrix.archive }}" \
            "dist/${ASSET_BASE}.${{ matrix.archive }}.sha256" \
            --clobber

  checksums:
    name: publish aggregate checksums
    runs-on: ubuntu-24.04
    needs:
      - build
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/artifacts
          pattern: rpotato-${{ env.RELEASE_TAG }}-*

      - name: Validate artifacts and build aggregate checksum file
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/release-assets
          mkdir -p dist/release-assets
          find dist/artifacts -type f -print0 \
            | while IFS= read -r -d '' asset; do
                cp "$asset" "dist/release-assets/$(basename "$asset")"
              done
          find dist/release-assets -name '*.sha256' -type f -print0 \
            | sort -z \
            | xargs -0 cat \
            | LC_ALL=C sort -t ' ' -k3,3 \
            > "dist/release-assets/rpotato-${RELEASE_TAG}-checksums.txt"
          scripts/release/verify-release-assets.sh "$RELEASE_TAG" dist/release-assets

      - name: Upload checksum workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpotato-${{ env.RELEASE_TAG }}-checksums
          path: dist/release-assets/rpotato-${{ env.RELEASE_TAG }}-checksums.txt
          if-no-files-found: error

      - name: Upload checksum file to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" \
            "dist/release-assets/rpotato-${RELEASE_TAG}-checksums.txt" \
            --clobber

  published-assets-verify:
    name: verify published release assets
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs:
      - test
      - build
      - checksums
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download and verify published assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist/published
          mkdir -p dist/published
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --dir dist/published
          scripts/release/verify-release-assets.sh "$RELEASE_TAG" dist/published

  cleanup-release-branch:
    name: cleanup verified release branch
    if: >-
      github.event_name == 'release' &&
      needs.test.result == 'success' && needs.build.result == 'success' &&
      needs.checksums.result == 'success' &&
      needs.published-assets-verify.result == 'success'
    runs-on: ubuntu-24.04
    needs:
      - test
      - build
      - checksums
      - published-assets-verify
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RPOTATO_RELEASE_TAG: ${{ github.event.release.tag_name }}
      RPOTATO_RELEASE_BRANCH: release/${{ github.event.release.tag_name }}
      RPOTATO_REQUIRE_TAG_ON_MAIN: 1
      RPOTATO_REQUIRE_RELEASE_BRANCH_EXISTS: 1
      RPOTATO_DELETE_RELEASE_BRANCH: 1
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name }}

      - name: Delete release branch after asset verification
        shell: bash
        run: |
          set -euo pipefail
          scripts/release/verify-release-policy.sh
          if git ls-remote --exit-code --heads origin "release/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release branch still exists after cleanup" >&2
            exit 1
          fi

  release-failure-preserves-branch:
    name: preserve release branch after failed verification
    if: >-
      always() && github.event_name == 'release' &&
      (needs.test.result != 'success' || needs.build.result != 'success' ||
      needs.checksums.result != 'success' ||
      needs.published-assets-verify.result != 'success')
    runs-on: ubuntu-24.04
    needs:
      - test
      - build
      - checksums
      - published-assets-verify
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      RELEASE_BRANCH: release/${{ github.event.release.tag_name }}
      TEST_RESULT: ${{ needs.test.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      CHECKSUMS_RESULT: ${{ needs.checksums.result }}
      PUBLISHED_ASSETS_RESULT: ${{ needs.published-assets-verify.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify failed release preserved its branch
        shell: bash
        run: |
          set -euo pipefail
          failure_cause="published-assets-verify:$PUBLISHED_ASSETS_RESULT"
          if [ "$TEST_RESULT" != success ]; then
            failure_cause="test:$TEST_RESULT"
          elif [ "$BUILD_RESULT" != success ]; then
            failure_cause="build:$BUILD_RESULT"
          elif [ "$CHECKSUMS_RESULT" != success ]; then
            failure_cause="checksums:$CHECKSUMS_RESULT"
          fi
          upstream_results="test=$TEST_RESULT,build=$BUILD_RESULT,checksums=$CHECKSUMS_RESULT,published-assets-verify=$PUBLISHED_ASSETS_RESULT"
          scripts/release/report-release-failure.sh "$failure_cause" "$upstream_results" "$RELEASE_BRANCH" origin
