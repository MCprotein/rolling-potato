name: macos-native-targeted

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  macos-native:
    name: macOS native tests (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: aarch64-apple-darwin
          - os: macos-26-intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test entry and EOF lifecycle
        timeout-minutes: 5
        run: cargo test --locked --target ${{ matrix.target }} --test native_terminal entry_quit -- --exact --test-threads=1

      - name: Test full native adapter
        timeout-minutes: 5
        run: cargo test --locked --target ${{ matrix.target }} --test native_terminal full_adapter -- --exact --test-threads=1
