name: release-policy

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

jobs:
  release-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce release branch and tag policy
        env:
          RPOTATO_RELEASE_BRANCH: ${{ github.head_ref }}
          RPOTATO_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          RPOTATO_REQUIRE_RELEASE_BRANCH: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          RPOTATO_REQUIRE_TAG_ON_MAIN: ${{ github.ref_type == 'tag' && '1' || '0' }}
          RPOTATO_DELETE_RELEASE_BRANCH: ${{ github.ref_type == 'tag' && '1' || '0' }}
        run: ./scripts/release/verify-release-policy.sh
