name: release-policy

permissions:
  contents: write

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"

jobs:
  release-policy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify repository tool pins
        run: scripts/release/verify-toolchain-pins.sh

      - name: Verify release target matrix
        run: scripts/release/verify-release-target-matrix.sh

      - name: Enforce release branch and tag policy
        env:
          RPOTATO_RELEASE_BRANCH: ${{ github.head_ref }}
          RPOTATO_RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          RPOTATO_REQUIRE_RELEASE_BRANCH: ${{ github.event_name == 'pull_request' && '1' || '0' }}
          RPOTATO_REQUIRE_TAG_ON_MAIN: ${{ github.ref_type == 'tag' && '1' || '0' }}
          RPOTATO_DELETE_RELEASE_BRANCH: ${{ github.ref_type == 'tag' && '1' || '0' }}
        run: ./scripts/release/verify-release-policy.sh
