name: windows-native-targeted

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  windows-native:
    name: Windows native terminal targeted tests
    runs-on: windows-2025
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test backend lifecycle
        timeout-minutes: 5
        run: cargo test --locked --target x86_64-pc-windows-msvc --test backend_lifecycle -- --test-threads=1

      - name: Test entry and EOF lifecycle
        timeout-minutes: 5
        run: cargo test --locked --target x86_64-pc-windows-msvc --test native_terminal entry_quit -- --exact --test-threads=1

      - name: Test full native adapter
        timeout-minutes: 5
        env:
          RPOTATO_NATIVE_TERMINAL_TRACE: native-terminal-trace.log
        run: cargo test --locked --target x86_64-pc-windows-msvc --test native_terminal full_adapter -- --exact --test-threads=1 --nocapture

      - name: Print full adapter stage trace
        if: always()
        shell: pwsh
        run: |
          if (Test-Path native-terminal-trace.log) {
            Get-Content native-terminal-trace.log
          }
