name: windows-native-targeted

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  windows-native:
    name: Windows native terminal targeted tests
    runs-on: windows-2025
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test entry and EOF lifecycle
        timeout-minutes: 5
        run: cargo test --locked --target x86_64-pc-windows-msvc --test native_terminal entry_quit -- --exact --test-threads=1

      - name: Test full native adapter
        timeout-minutes: 5
        run: cargo test --locked --target x86_64-pc-windows-msvc --test native_terminal full_adapter -- --exact --test-threads=1
